{% extends 'base.html' %}

{% block content %}
<h2>💬 Chat – {{ project.title }}</h2>

<div class="chat-box">
  {% for msg in messages %}
    <div class="{% if msg.sender == user %}me{% else %}them{% endif %}">
      <strong>{{ msg.sender.username }}</strong><br>
      {{ msg.content }}
    </div>
  {% endfor %}
</div>

<form method="post">
  {% csrf_token %}
  <input type="text" name="message" placeholder="Type message..." required>
  <button type="submit">Send</button>
</form>
{% endblock %}
