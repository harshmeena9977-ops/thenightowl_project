{% extends "base.html" %}
{% block content %}

<h2>My Portfolio</h2>
<a href="{% url 'add_project' %}">➕ Add New Project</a>

<hr>

{% for project in projects %}
  <div>
    <h3>{{ project.title }}</h3>
    <p>{{ project.description }}</p>
    {% if project.image %}
      <img src="{{ project.image.url }}" width="200">
    {% endif %}
  </div>
  <hr>
{% empty %}
  <p>No projects yet.</p>
{% endfor %}

{% endblock %}
