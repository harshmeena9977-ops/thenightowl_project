{% extends 'portfolio/base.html' %}
{% block content %}
<h1>Browse Designers</h1>

<style>
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}
.card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    text-align: center;
}
.avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 15px;
}
.btn {
    display: inline-block;
    padding: 10px 20px;
    background: #4f46e5;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    margin-top: 10px;
}
</style>

<div class="grid">
    {% for designer in designers %}
        <div class="card">
            <img class="avatar" src="{{ designer.profile_image.url }}" alt="Profile">
            <h3>{{ designer.user.username }}</h3>
            <p>{{ designer.title }}</p>
            <a href="{% url 'designer_profile' designer.user.username %}" class="btn">View Profile</a>
        </div>
    {% empty %}
        <p>No designers available.</p>
    {% endfor %}
</div>

{% endblock %}
