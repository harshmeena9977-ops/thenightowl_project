{% extends "portfolio/base.html" %}

{% block content %}
<h2>Our Projects</h2>

{% if projects %}
    <div class="grid">
        {% for project in projects %}
            <div class="card">
                <h3>{{ project.title }}</h3>
                <p>{{ project.description }}</p>
            </div>
        {% endfor %}
    </div>
{% else %}
    <p>No projects available yet.</p>
{% endif %}

{% endblock %}
